image: ubuntu:22.04

stages:
  - terraform_init
  - terraform_plan
  - terraform_apply

before_script:
  - apt-get update && apt-get install -y curl unzip gnupg software-properties-common apt-transport-https lsb-release

  # 🟦 Installer Azure CLI
  - curl -sL https://aka.ms/InstallAzureCLIDeb | bash

  # 🟦 Installer Terraform
  - curl -sLo terraform.zip https://releases.hashicorp.com/terraform/1.6.6/terraform_1.6.6_linux_amd64.zip
  - unzip terraform.zip
  - mv terraform /usr/local/bin/
  - terraform -version

  # 🟦 Login Azure CLI via Service Principal
  - az login --service-principal \
      -u "$ARM_CLIENT_ID" \
      -p "$ARM_CLIENT_SECRET" \
      --tenant "$ARM_TENANT_ID"

  - az account set --subscription "$ARM_SUBSCRIPTION_ID"

terraform_init:
  stage: terraform_init
  script:
    - terraform init
  artifacts:
    paths:
      - .terraform/
      - .terraform.lock.hcl

terraform_plan:
  stage: terraform_plan
  script:
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - tfplan

terraform_apply:
  stage: terraform_apply
  script:
    - terraform apply -auto-approve tfplan
  when: manual
