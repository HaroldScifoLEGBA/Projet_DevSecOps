stages:
  - terraform_init
  - terraform_plan
  - terraform_apply
  - sast

variables:
  TF_ROOT: "./"
  TF_IN_AUTOMATION: "true"

before_script:
  - apk add --no-cache curl unzip jq
  - curl -L https://releases.hashicorp.com/terraform/1.6.6/terraform_1.6.6_linux_amd64.zip -o tf.zip
  - unzip tf.zip && mv terraform /usr/local/bin && rm tf.zip

terraform_init:
  stage: terraform_init
  script:
    - terraform init
  artifacts:
    paths:
      - .terraform
      - .terraform.lock.hcl
    expire_in: 1 week

terraform_plan:
  stage: terraform_plan
  script:
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - tfplan
    expire_in: 1 week
  needs:
    - terraform_init

terraform_apply:
  stage: terraform_apply
  script:
    - terraform apply -auto-approve tfplan
  when: manual
  needs:
    - terraform_plan

include:
  - template: Jobs/SAST-IaC.gitlab-ci.yml


