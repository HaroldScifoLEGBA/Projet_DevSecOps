image: alpine:3.18

stages:
  - prepare
  - terraform_init
  - terraform_plan
  - terraform_apply
  - test
  - sast

variables:
  TF_ROOT: "./"
  TF_IN_AUTOMATION: "true"

prepare:
  stage: prepare
  script:
    - apk add --no-cache curl unzip bash jq
    - curl -L -o terraform.zip https://releases.hashicorp.com/terraform/1.6.6/terraform_1.6.6_linux_amd64.zip
    - unzip terraform.zip
    - mv terraform /usr/local/bin/
    - terraform version

terraform_init:
  stage: terraform_init
  script:
    - terraform init
  artifacts:
    paths:
      - .terraform
      - .terraform.lock.hcl
    expire_in: 1 week
  needs:
    - prepare

terraform_plan:
  stage: terraform_plan
  script:
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - tfplan
    expire_in: 1 week
  needs:
    - terraform_init

terraform_apply:
  stage: terraform_apply
  script:
    - terraform apply -auto-approve tfplan
  when: manual
  needs:
    - terraform_plan

include:
  - template: Jobs/SAST-IaC.gitlab-ci.yml
